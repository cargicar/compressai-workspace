svd:
  backend: "numpy"    # "sklearn" (randomized_svd) or "numpy" (linalg.svd, exact but slower)

data:
  h5_path:   "/data/mldc/pde_bench/Turb_M1.hdf5"
  field_key: "pressure"
  timestep:  15          # index into the nt dimension (0-based → physical t=16)
  patch_size: 9       # 3D patch side length; must be divisible by stride
  n_patches:  1000       # virtual epoch size (random crops per epoch)
  batch_size: 16
  num_workers: 4

model:
  features:     32
  in_channels:  1        # scalar field (pressure)
  kernel_size:  9        # must be odd
  stride:       3        # output: (27/3)³ = 9³ = 729 code positions/patch; must divide patch_size
  lambda_:      0.05
  tau:          100
  lca_iters:    300   #This is for experimental purporses, use > 500 in practice
  learning_rate: 0.01

training:
  max_epochs: 400           # safety cap — training stops earlier via rel_err logic
  lambda_anneal_start: 15   # fallback only (used when rel_err_target is not set)
  lambda_anneal_stop:  200  # max epochs spent in annealing mode (excl. stabilize phases)
  lambda_anneal_every: 1
  lambda_anneal_step:  0.02
  dtype: "float32"
  rel_err_target:   0.1   # rel_err threshold: hit it → stabilize → anneal → repeat
  rel_err_ceiling:  0.2   # λ increment is skipped if last epoch rel_err exceeded this; best checkpoint saved below this
  stabilize_epochs: 10     # epochs to freeze λ; done when anneal_stop reached + stabilized

output:
  n_images: 4
  plot_start_epoch: 5   # training_metrics_tail.png starts here; 0 = disabled
